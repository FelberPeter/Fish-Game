<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A lightweight browser fishing game with upgrade mechanics.">
    <title>Fish Game</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230072ff'/%3E%3Cpath d='M9 33c8-11 23-15 36-5l8-7c2 7 2 14 0 21l-8-7C32 45 17 44 9 33Z' fill='%23fff7ad'/%3E%3Ccircle cx='39' cy='30' r='3' fill='%230f2b46'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-shell">
        <main id="play-area">
            <div id="game-shell">
                <div id="game-world">
                    <div id="score-container">
                        <span class="score-label">Score</span>
                        <span id="score">0</span>
                    </div>
                    <div id="game-status" aria-live="polite"></div>
                    <div id="player-fishing-line" class="fishing-line"></div>
                    <div id="player-hook" class="hook"></div>
                </div>
                <aside id="legend">
                    <div class="legend-gradient-bar">
                        <span class="legend-value top">20</span>
                        <span class="legend-value bottom">3</span>
                    </div>
                </aside>
            </div>

            <div id="view-controls">
                <button id="zoom-out" class="view-btn" aria-label="Zoom verkleinern">−</button>
                <button id="zoom-in" class="view-btn" aria-label="Zoom vergrößern">+</button>
                <button id="pause-toggle" class="view-btn" aria-label="Pause umschalten">II</button>
                <button id="reset-progress" class="view-btn danger" aria-label="Spielstand zuruecksetzen">↺</button>
                <button id="fullscreen-toggle" class="view-btn" aria-label="Fullscreen umschalten">⛶</button>
            </div>
        </main>

        <section id="upgrade-panel">
            <div class="upgrade-controls">
                <div class="upgrade-item">
                    <div class="upgrade-title"><span>Player Reel Speed</span> <span id="player-reel-speed-level" class="level-pill inline">Lv. 1</span></div>
                    <button id="buy-reel-speed" data-cost="50">Buy (Cost: 50)</button>
                </div>
                <div class="upgrade-item">
                    <div class="upgrade-title"><span>Player Cast Speed</span> <span id="player-cast-speed-level" class="level-pill inline">Lv. 1</span></div>
                    <button id="buy-cast-speed" data-cost="50">Buy (Cost: 50)</button>
                </div>
                <div class="upgrade-item">
                    <div class="upgrade-title"><span>Place Auto-Fisher</span> <span id="auto-fisher-count" class="level-pill inline">0</span></div>
                    <button id="buy-auto-fisher" data-cost="250">Buy (Cost: 250)</button>
                </div>
            </div>
            <div id="auto-fisher-upgrades"></div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
